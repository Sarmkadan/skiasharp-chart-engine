# Docker Compose configuration for SkiaSharp Chart Engine
# ===================================================================
version: '3.8'

services:
  chart-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skiasharp-chart-engine
    restart: unless-stopped

    # Port mappings
    ports:
      - "8080:8080"

    # Environment configuration
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_RUNNING_IN_CONTAINER: "true"
      CACHE_DURATION: "300"
      MAX_CONCURRENT_RENDERS: "10"

    # Volume mounts for persistent storage
    volumes:
      - ./output:/app/output
      - ./config:/app/config
      - chart-cache:/app/cache

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Named volumes
volumes:
  chart-cache:
    driver: local